{% extends 'base.html' %}
{% block content %}
<div class="form-card">
  <header>
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.svg')}}" alt="logo">
    </div>
    <span>RxPy</span>  
  </header>  
 {% if request.endpoint == 'signin' %}
    <form method="POST">
        <label for="email">E-mail</label>
        <input type="email" name="email" placeholder="E-mail" id="email">
        <label for="password">Password</label>
        <input type="password" name="password" placeholder="Password" id="password">
        <input type="submit" value="Sign in">
        <span>Don’t have an account?<a href="{{ url_for('register')}}">Sign up here</a></span>
    </form>
  {% elif request.endpoint == 'register' %}
    <form method="POST">
        <label for="name">Fullname</label>
        <input type="text" name="fullname" placeholder="Fullname" id="name">
        <label for="email">E-mail</label>
        <input type="email" name="email" placeholder="E-mail" id="email">
        <label for="password">Password</label>
        <input type="password" name="password" placeholder="Password" id="password">
        <input type="submit" value="Register">
        <span>Have an account?<a href="{{ url_for('signin')}}">Sign in here</a></span>
    </form>
 {% endif %}
</div>
{% endblock %}
